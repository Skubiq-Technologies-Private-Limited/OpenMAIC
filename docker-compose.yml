services:
  openmaic:
    image: ${OPENMAIC_IMAGE:-ghcr.io/skubiq-technologies-private-limited/openmaic:main}
    pull_policy: always
    container_name: openmaic_prod
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    networks:
      - sims_default
    restart: unless-stopped

networks:
  sims_default:
    external: true
